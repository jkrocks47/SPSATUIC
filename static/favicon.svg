<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <defs>
    <radialGradient id="planet" cx="40%" cy="35%" r="50%">
      <stop offset="0%" stop-color="#9b8afb"/>
      <stop offset="100%" stop-color="#4338ca"/>
    </radialGradient>
    <radialGradient id="glow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#818cf8" stop-opacity="0.4"/>
      <stop offset="100%" stop-color="#818cf8" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <!-- Stars -->
  <circle cx="5" cy="8" r="1.2" fill="#fff" opacity="0.8"/>
  <circle cx="58" cy="5" r="1" fill="#fff" opacity="0.7"/>
  <circle cx="10" cy="55" r="1.1" fill="#fff" opacity="0.7"/>
  <circle cx="56" cy="50" r="0.9" fill="#fff" opacity="0.6"/>
  <circle cx="4" cy="32" r="0.8" fill="#c4b5fd" opacity="0.6"/>
  <circle cx="60" cy="28" r="0.8" fill="#fff" opacity="0.5"/>
  <circle cx="28" cy="4" r="0.7" fill="#fff" opacity="0.6"/>
  <circle cx="50" cy="60" r="0.8" fill="#a5b4fc" opacity="0.6"/>

  <!-- Glow behind planet -->
  <circle cx="32" cy="32" r="24" fill="url(#glow)"/>

  <!-- Planet -->
  <circle cx="32" cy="32" r="18" fill="url(#planet)"/>

  <!-- Planet surface detail -->
  <ellipse cx="26" cy="26" rx="6" ry="3.5" fill="#b4a5fd" opacity="0.25" transform="rotate(-15 26 26)"/>
  <ellipse cx="38" cy="36" rx="5" ry="2.5" fill="#5346c8" opacity="0.35" transform="rotate(10 38 36)"/>
  <ellipse cx="30" cy="40" rx="3.5" ry="1.5" fill="#b4a5fd" opacity="0.15" transform="rotate(-5 30 40)"/>

  <!-- Ring (orbit) -->
  <ellipse cx="32" cy="32" rx="28" ry="8" fill="none" stroke="#9b8afb" stroke-width="2" opacity="0.5" transform="rotate(-20 32 32)"/>

  <!-- Small moon -->
  <circle cx="52" cy="18" r="3.5" fill="#ddd6fe"/>
  <circle cx="50.8" cy="17" r="3.5" fill="rgba(0,0,0,0.2)"/>

  <!-- Shooting star -->
  <line x1="8" y1="16" x2="18" y2="20" stroke="#fff" stroke-width="1.2" opacity="0.5" stroke-linecap="round"/>
  <line x1="8" y1="16" x2="11" y2="17" stroke="#fff" stroke-width="1.8" opacity="0.8" stroke-linecap="round"/>
</svg>
